services:
  - type: web
    name: fx-desk
    runtime: static
    buildCommand: "echo no-build-needed"
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
